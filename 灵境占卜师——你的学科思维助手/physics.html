      <section class="subject-intro glass">
        <h2>物理学 🌌</h2>
        <p>物理学帮助我们理解“世界为什么这样运转”。在校园场景里，复习疲劳可看作能量分配问题，宿舍混乱像熵增结果，拖延启动则与惯性有关。物理思维的价值在于定量和可验证：你可以观察、记录、调整，再看结果变化。面对压力时，规律比情绪更稳定，先稳住系统，再提升效率，往往更有效。</p>
      </section>

      <section class="cards">
        <article class="card glass"><h3>冷知识 1</h3><p>闪电通道温度可瞬间超过太阳表面温度。</p></article>

        <article class="card glass"><h3>冷知识 3</h3><p>猫在空中扭身调整姿态，与角动量守恒密切相关。</p></article>

  <link rel="stylesheet" href="style.css">

<body>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="page-shell">
    <header class="site-header glass">
      <div class="brand-wrap">
        <div class="avatar">🗣️</div>
        <div>
          <h1>语言学 · 沟通与思维</h1>
          <p>表达方式会影响理解方式</p>
        </div>
      </div>
    </header>

    <main class="subject-main">
      <section class="subject-intro glass">
        <h2>语言学 📚</h2>
        <p>语言学研究的不只是“怎么说”，更是“为什么这样说会被这样理解”。校园生活里的课堂发言、组队协作、宿舍交流都依赖语言策略。理解语境、语用和会话含义后，你会更少误解、更快达成共识。语言也会反向塑造思维，换一种表达框架，往往就能换一种行动状态。</p>
      </section>

      <section class="cards">
        <article class="card glass"><h3>冷知识 1</h3><p>同一句话在不同语境下，礼貌程度和真实含义可能完全不同。</p></article>
        <article class="card glass"><h3>冷知识 2</h3><p>词源记忆法能显著提升单词长期记忆效果。</p></article>
        <article class="card glass"><h3>冷知识 3</h3><p>语气词虽短，却是口语中传递态度的高密度信息单元。</p></article>
      </section>

      <div class="actions"><a class="btn-link" href="index.html">返回占卜</a></div>
      <p class="campus-note">校园文化角落：会表达的人，不是话多，而是能让人听懂并愿意合作。</p>
    </main>
